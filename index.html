<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Tracker Dashboard 🚀</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --border-color: #30363d;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--accent-blue);
        }

        .filter-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .powered-by {
            margin-top: auto;
            font-size: 0.65rem;
            color: #30363d;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-bottom: 5px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        .powered-by span {
            color: var(--accent-blue);
            line-height: 1.4;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        header {
            padding: 15px 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .controls-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
            min-width: 0;
            position: relative;
        }

        /* Hamburger Menu */
        .menu-toggle {
            display: none;
            background: none;
            border: 1px solid var(--border-color);
            color: white;
            font-size: 1.2rem;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .tech-filters-wrapper {
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            flex-grow: 1;
        }

        /* Scroll Hint Shadow */
        .tech-filters-wrapper::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 40px;
            background: linear-gradient(to right, transparent, var(--card-bg));
            pointer-events: none;
            opacity: 0.8;
        }

        .tech-filters {
            display: flex;
            gap: 8px;
            align-items: center;
            overflow-x: auto;
            padding: 5px 40px 5px 5px;
            scrollbar-width: none;
        }

        .tech-filters::-webkit-scrollbar { display: none; }

        .filter-pill {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-pill:hover { border-color: var(--accent-blue); }

        .filter-pill.active {
            background-color: rgba(88, 166, 255, 0.15);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .filter-pill.active.bull {
            background-color: rgba(63, 185, 80, 0.15);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .clear-filters {
            font-size: 0.75rem;
            color: #8b949e;
            cursor: pointer;
            text-decoration: underline;
            margin-left: 5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .rainbow-text {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #4285f4);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .search-container {
            position: relative;
            max-width: 160px;
            width: 100%;
            flex-shrink: 0;
        }

        #searchInput {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 0.85rem;
            box-sizing: border-box;
        }

        .sort-controls {
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            background-color: var(--bg-color);
            position: relative;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .sort-btn {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: #8b949e;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .sort-btn:hover {
            color: var(--text-color);
            border-color: var(--accent-blue);
        }

        .sort-btn.active {
            color: var(--accent-blue);
            background-color: rgba(88, 166, 255, 0.1);
            border-color: var(--accent-blue);
        }

        /* --- Updated Stable Grid & Cards --- */
        .dashboard-grid {
            padding: 20px 15px 40px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            flex-grow: 1;
            align-content: start;
            scroll-padding-top: 100px; /* Offset for scrollIntoView */
        }

        .stock-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            height: fit-content;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            scroll-margin-top: 100px;
        }

        @media (hover: hover) {
            .stock-card:hover {
                transform: translateY(-5px);
                border-color: var(--accent-blue);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }
            .stock-card:hover .card-details {
                display: block;
                opacity: 1;
                transform: translateY(0);
                margin-top: 15px;
            }
            .stock-card:hover .expand-hint {
                display: none;
            }
        }

        .stock-card.expanded {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .stock-card.expanded .card-details {
            display: block;
            opacity: 1;
            transform: translateY(0);
            margin-top: 15px;
        }

        .stock-card.expanded .expand-hint {
            display: none;
        }

        .card-details {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            margin-top: 0;
        }

        .expand-hint {
            font-size: 0.65rem;
            color: #30363d;
            text-align: left;
            margin-top: 5px;
        }

        /* Global Footer Signature */
        .global-footer {
            display: none; /* Hidden on Desktop */
            padding: 30px 20px;
            text-align: center;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
            font-size: 0.75rem;
            color: #30363d;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                height: 100vh;
                transform: translateX(-100%);
                box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            }

            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }

            header {
                padding: 10px 15px;
                gap: 10px;
            }

            .controls-container { gap: 10px; }
            .search-container { max-width: 100px; }

            .sort-controls {
                padding: 12px 15px;
                overflow-x: auto;
                scrollbar-width: none;
            }

            .global-footer {
                display: block; /* Visible only on Mobile */
            }
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .ticker-wrapper {
            flex: 1;
            min-width: 0;
        }

        .ticker {
            font-size: 1.15rem;
            font-weight: bold;
            color: white;
            line-height: 1.2;
            word-break: break-word;
        }

        .sector-tag {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            background-color: rgba(88, 166, 255, 0.1);
            color: var(--accent-blue);
            margin-top: 2px;
            display: inline-block;
        }

        .price-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .info-box {
            background-color: rgba(255, 255, 255, 0.04);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }

        .info-label {
            font-size: 0.65rem;
            color: #8b949e;
            display: block;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .technical-indicators {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .indicator {
            font-size: 0.75rem;
            padding: 3px 6px;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.03);
        }

        .pos { color: var(--accent-green); }
        .neg { color: var(--accent-red); }
        .neutral { color: var(--accent-yellow); }

        .note {
            font-size: 0.75rem;
            font-style: italic;
            color: #8b949e;
            border-top: 1px solid var(--border-color);
            padding-top: 8px;
            line-height: 1.4;
        }

        .rr-badge {
            background-color: var(--accent-green);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }

        .sidebar-overlay.active { display: block; }

        #mobileCloseBtn {
            display: none;
            background: none;
            border: none;
            color: #8b949e;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            #mobileCloseBtn { display: block; }
        }
    </style>
</head>

        function renderCards(data) {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = '';
            
            data.forEach(stock => {
                const card = document.createElement('div');
                card.className = 'stock-card';
                card.onclick = function(event) { 
                    const isExpanded = this.classList.contains('expanded');
                    
                    // Always close all other cards (Accordion Logic)
                    document.querySelectorAll('.stock-card.expanded').forEach(c => {
                        if (c !== this) {
                            c.classList.remove('expanded');
                        }
                    });

                    // Toggle the clicked card (Tap to Open / Tap again to Close)
                    this.classList.toggle('expanded');
                    
                    // On mobile, scroll the card into view if it was just opened
                    if (window.innerWidth <= 768 && this.classList.contains('expanded')) {
                        setTimeout(() => {
                           this.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, 350); // Slight delay for animation to start
                    }
                };
                
                const macdClass = stock.macd === '+' ? 'pos' : 'neg';
                const smaClass = stock.sma === 'up' ? 'pos' : 'neg';
                
                card.innerHTML = `
                    <div class="stock-header">
                        <div class="ticker-wrapper">
                            <div class="ticker">${stock.ticker}</div>
                            <div class="sector-tag">${stock.sector}</div>
                        </div>
                        ${stock.rr > 0 ? `<div class="rr-badge">R/R ${stock.rr}</div>` : '<div></div>'}
                    </div>
                    
                    <div class="expand-hint">▼ Click to see details</div>

                    <div class="card-details">
                        <div class="price-info">
                            <div class="info-box">
                                <span class="info-label">Support</span>
                                <span class="info-value">${stock.support}</span>
                            </div>
                            <div class="info-box">
                                <span class="info-label">Target Price</span>
                                <span class="info-value" style="color: var(--accent-blue)">${stock.tp}</span>
                            </div>
                            <div class="info-box">
                                <span class="info-label">Resistance</span>
                                <span class="info-value">${stock.resistance}</span>
                            </div>
                            <div class="info-box">
                                <span class="info-label">Stop Loss</span>
                                <span class="info-value" style="color: var(--accent-red)">${stock.sl}</span>
                            </div>
                        </div>
                        <div class="technical-indicators">
                            <span class="indicator">MACD: <b class="${macdClass}">${stock.macd}</b></span>
                            <span class="indicator">SMA: <b class="${smaClass}">${stock.sma}</b></span>
                        </div>
                        <div class="note">${stock.note}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setSector(sector) {
            currentSector = sector;
            document.querySelectorAll('.sidebar .filter-btn').forEach(btn => {
                const btnSector = btn.getAttribute('data-sector');
                btn.classList.toggle('active', btnSector === sector);
            });
            if (window.innerWidth <= 768) toggleSidebar(); 
            applyFilters();
        }

        function toggleTechFilter(filter) {
            techFilters[filter] = !techFilters[filter];
            const mapping = { 'rr': 'filterRR', 'macd': 'filterMACD', 'sma': 'filterSMA', 'bull': 'filterBull' };
            document.getElementById(mapping[filter]).classList.toggle('active');
            applyFilters();
        }

        function setSort(sortType) {
            currentSort = sortType;
            document.getElementById('sortNone').classList.toggle('active', currentSort === 'none');
            document.getElementById('sortAZ').classList.toggle('active', currentSort === 'az');
            document.getElementById('sortRR').classList.toggle('active', currentSort === 'rr');
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toUpperCase();
            
            let filtered = stockData.filter(stock => {
                if (currentSector !== 'all' && stock.sector !== currentSector) return false;
                if (search && !stock.ticker.includes(search)) return false;
                if (techFilters.rr && stock.rr < 1.5) return false;
                if (techFilters.macd && stock.macd !== '+') return false;
                if (techFilters.sma && stock.sma !== 'up') return false;
                if (techFilters.bull && (stock.macd !== '+' || stock.sma !== 'up' || stock.rr < 1.5)) return false;
                return true;
            });

            if (currentSort === 'az') {
                filtered.sort((a, b) => a.ticker.localeCompare(b.ticker));
            } else if (currentSort === 'rr') {
                filtered.sort((a, b) => b.rr - a.rr);
            }

            renderCards(filtered);
        }

        function resetAllFilters() {
            currentSector = 'all';
            currentSort = 'none';
            techFilters = { rr: false, macd: false, sma: false, bull: false };
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            document.getElementById('sortNone').classList.add('active');
            document.getElementById('sortAZ').classList.remove('active');
            document.getElementById('sortRR').classList.remove('active');
            document.querySelectorAll('.sidebar .filter-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-sector') === 'all');
            });
            applyFilters();
        }

        applyFilters();
    </script>
