<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Tracker Dashboard 🚀</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --border-color: #30363d;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Lock main body scroll */
        }

        /* Sidebar - Fixed to the left */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
            flex-shrink: 0;
            z-index: 2000;
            transition: transform 0.3s ease;
        }

        .sidebar h2 {
            font-size: 1.25rem;
            margin-bottom: 25px;
            color: var(--accent-blue);
            font-weight: 800;
            letter-spacing: 1px;
        }

        .filter-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
        }

        .powered-by-sidebar {
            margin-top: auto;
            font-size: 0.7rem;
            color: #484f58;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Rainbow Effect */
        .rainbow-text {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #4285f4);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            animation: shine 4s linear infinite;
            font-weight: 800;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Main Content - Flex column */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100vh;
            position: relative;
        }

        /* Header Area - Static at top of main-content */
        .nav-container {
            flex-shrink: 0;
            background-color: var(--bg-color);
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        header {
            padding: 15px 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .search-container {
            width: 180px;
            flex-shrink: 0;
        }

        #searchInput {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 0.85rem;
        }

        .tech-filters-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
        }

        .tech-filters-wrapper::after {
            content: '';
            position: absolute; right: 0; top: 0; bottom: 0; width: 40px;
            background: linear-gradient(to right, transparent, var(--card-bg));
            pointer-events: none;
        }

        .tech-filters {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 40px 5px 5px;
            scrollbar-width: none;
        }
        .tech-filters::-webkit-scrollbar { display: none; }

        .filter-pill {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-pill.active {
            background-color: rgba(88, 166, 255, 0.15);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .sort-controls {
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            background-color: var(--bg-color);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .sort-controls::-webkit-scrollbar { display: none; }

        .sort-btn {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: #8b949e;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sort-btn.active {
            color: var(--accent-blue);
            background-color: rgba(88, 166, 255, 0.1);
            border-color: var(--accent-blue);
        }

        /* Scrollable Area */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
        }

        .dashboard-grid {
            padding: 25px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 20px;
            align-content: start;
        }

        .stock-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            height: fit-content;
        }

        .stock-card.expanded {
            border-color: var(--accent-blue);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-5px);
        }

        @media (hover: hover) {
            .stock-card:hover {
                border-color: var(--accent-blue);
                transform: translateY(-5px);
            }
        }

        .card-details {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .stock-card.expanded .card-details {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .grid-footer {
            margin-top: auto;
            padding: 50px 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #30363d;
            letter-spacing: 2px;
            font-weight: bold;
            border-top: 1px solid var(--border-color);
        }

        /* Mobile Viewports */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0; top: 0; bottom: 0;
                transform: translateX(-100%);
                box-shadow: 10px 0 40px rgba(0,0,0,0.7);
            }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .search-container { width: 130px; }
            header { padding: 10px 15px; gap: 10px; }
            .tech-filters { padding-right: 20px; }
        }

        /* Card Content Styles */
        .stock-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .ticker { font-size: 1.2rem; font-weight: 800; color: white; line-height: 1.2; word-break: break-word; }
        .sector-tag { font-size: 0.65rem; padding: 3px 8px; border-radius: 12px; background-color: rgba(88, 166, 255, 0.1); color: var(--accent-blue); margin-top: 4px; display: inline-block; font-weight: bold; }
        .rr-badge { background-color: var(--accent-green); color: white; padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; flex-shrink: 0; }
        .price-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-box { background-color: rgba(255, 255, 255, 0.03); padding: 10px; border-radius: 8px; text-align: center; }
        .info-label { font-size: 0.6rem; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .info-value { font-size: 0.95rem; font-weight: bold; }
        .technical-indicators { display: flex; gap: 10px; margin-bottom: 15px; }
        .indicator { font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; background-color: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05); }
        .pos { color: var(--accent-green); }
        .neg { color: var(--accent-red); }
        .note { font-size: 0.75rem; font-style: italic; color: #8b949e; border-top: 1px solid var(--border-color); padding-top: 10px; line-height: 1.5; }
        .expand-hint { font-size: 0.65rem; color: #30363d; margin-top: 8px; }
        .stock-card.expanded .expand-hint { display: none; }

        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; }
        .sidebar-overlay.active { display: block; }
        #mobileCloseBtn { display: none; background: none; border: none; color: #8b949e; font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 768px) { #mobileCloseBtn { display: block; } }
    </style>
</head>

        function renderCards(data) {
            const grid = document.getElementById('dashboardGrid');
            const scrollContainer = document.getElementById('scrollContainer');
            grid.innerHTML = '';
            
            data.forEach(stock => {
                const card = document.createElement('div');
                card.className = 'stock-card';
                card.onclick = function() { 
                    const isExpanded = this.classList.contains('expanded');
                    document.querySelectorAll('.stock-card.expanded').forEach(c => {
                        if (c !== this) c.classList.remove('expanded');
                    });
                    this.classList.toggle('expanded');
                    
                    if (window.innerWidth <= 768 && this.classList.contains('expanded')) {
                        setTimeout(() => {
                           scrollContainer.scrollTo({
                               top: this.offsetTop - 10,
                               behavior: 'smooth'
                           });
                        }, 300);
                    }
                };
                
                const macdClass = stock.macd === '+' ? 'pos' : 'neg';
                card.innerHTML = `
                    <div class="stock-header">
                        <div class="ticker-wrapper">
                            <div class="ticker">${stock.ticker}</div>
                            <div class="sector-tag">${stock.sector}</div>
                        </div>
                        ${stock.rr > 0 ? `<div class="rr-badge">R/R ${stock.rr}</div>` : '<div></div>'}
                    </div>
                    <div class="expand-hint">▼ Click to see details</div>
                    <div class="card-details">
                        <div class="price-info">
                            <div class="info-box"><span class="info-label">Support</span><span class="info-value">${stock.support}</span></div>
                            <div class="info-box"><span class="info-label">Target Price</span><span class="info-value" style="color: var(--accent-blue)">${stock.tp}</span></div>
                            <div class="info-box"><span class="info-label">Resistance</span><span class="info-value">${stock.resistance}</span></div>
                            <div class="info-box"><span class="info-label">Stop Loss</span><span class="info-value" style="color: var(--accent-red)">${stock.sl}</span></div>
                        </div>
                        <div class="technical-indicators">
                            <span class="indicator">MACD: <b class="${macdClass}">${stock.macd}</b></span>
                            <span class="indicator">SMA: <b class="${stock.sma === 'up' ? 'pos' : 'neg'}">${stock.sma}</b></span>
                        </div>
                        <div class="note">${stock.note}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setSector(sector) {
            currentSector = sector;
            document.querySelectorAll('.sidebar .filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-sector') === sector);
            });
            if (window.innerWidth <= 768) toggleSidebar(); 
            applyFilters();
        }

        function toggleTechFilter(filter) {
            techFilters[filter] = !techFilters[filter];
            const mapping = { 'rr': 'filterRR', 'macd': 'filterMACD', 'sma': 'filterSMA', 'bull': 'filterBull' };
            document.getElementById(mapping[filter]).classList.toggle('active');
            applyFilters();
        }

        function setSort(sortType) {
            currentSort = sortType;
            document.getElementById('sortNone').classList.toggle('active', currentSort === 'none');
            document.getElementById('sortAZ').classList.toggle('active', currentSort === 'az');
            document.getElementById('sortRR').classList.toggle('active', currentSort === 'rr');
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toUpperCase();
            let filtered = stockData.filter(stock => {
                if (currentSector !== 'all' && stock.sector !== currentSector) return false;
                if (search && !stock.ticker.includes(search)) return false;
                if (techFilters.rr && stock.rr < 1.5) return false;
                if (techFilters.macd && stock.macd !== '+') return false;
                if (techFilters.sma && stock.sma !== 'up') return false;
                if (techFilters.bull && (stock.macd !== '+' || stock.sma !== 'up' || stock.rr < 1.5)) return false;
                return true;
            });
            if (currentSort === 'az') filtered.sort((a, b) => a.ticker.localeCompare(b.ticker));
            else if (currentSort === 'rr') filtered.sort((a, b) => b.rr - a.rr);
            renderCards(filtered);
        }

        function resetAllFilters() {
            currentSector = 'all';
            currentSort = 'none';
            techFilters = { rr: false, macd: false, sma: false, bull: false };
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            document.getElementById('sortNone').classList.add('active');
            document.getElementById('sortAZ').classList.remove('active');
            document.getElementById('sortRR').classList.remove('active');
            document.querySelectorAll('.sidebar .filter-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-sector') === 'all');
            });
            applyFilters();
        }

        applyFilters();
    </script>
